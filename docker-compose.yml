version: '3.8'

services:
  app:
    build: .
    container_name: etl-app
    depends_on:
      - db
    volumes:
      - .:/app
    tty: true
    stdin_open: true

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: netflix_db
    ports:
      - "5432:5432"